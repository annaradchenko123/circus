<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Игры: Силомер</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; }
        .section { background: #fafbfc; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .section h2 { margin-top: 0; font-size: 1.2rem; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        .row { display: flex; gap: 20px; }
        .col { flex: 1; }
        .question-block { background: #fff; border: 1px solid #d1d5da; padding: 20px; border-radius: 8px; margin-bottom: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-block h4 { margin: 0 0 15px 0; color: #e67e22; font-size: 1.1rem; }
        .remove-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .correct-select { width: 100%; padding: 8px; background-color: #f0f8ff; border-color: #3498db; font-weight: bold; }
        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; font-size: 1rem; }
        .btn-generate { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; }
        #output-area { margin-top: 30px; display: none; background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #a5d6a7; }
        textarea.code-box { width: 100%; height: 100px; font-family: monospace; padding: 10px; border: 1px solid #a5d6a7; border-radius: 6px; resize: vertical; font-size: 0.9rem; margin-top:5px; }
        .copy-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="lbl-title">🛠️ Конструктор Силомера</h1>

    <!-- ПРЕСЕТЫ ЯЗЫКОВ -->
    <div class="section">
        <h2 id="lbl-lang-sec">🌐 Язык интерфейса</h2>
        <div class="form-group">
            <select id="lang-select" onchange="changeLanguage()">
                <option value="ru">🇷🇺 Русский</option>
                <option value="en">🇬🇧 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
        </div>
    </div>

    <!-- ДИЗАЙН -->
    <div class="section">
        <h2 id="lbl-design-sec">🎨 Дизайн и Шрифты</h2>
        <div class="row">
            <div class="col"><label id="lbl-font">Шрифт</label><select id="cfg-font"><option value="'Ubuntu', sans-serif">Ubuntu</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Comic Sans MS', cursive">Comic Sans</option><option value="'Courier New', Courier, monospace">Courier</option></select></div>
            <div class="col"><label id="lbl-color">Цвет текста</label><input type="color" id="cfg-color" value="#2c3e50"></div>
        </div><br>
        <div class="row">
            <div class="col"><label id="lbl-bg">Цвет плашек</label><input type="color" id="cfg-bg" value="#ffffff"></div>
            <div class="col"><label><span id="lbl-opacity">Прозрачность:</span> <span id="opacity-val">95</span>%</label><input type="range" id="cfg-opacity" min="50" max="100" value="95" oninput="document.getElementById('opacity-val').innerText = this.value"></div>
        </div>
    </div>

    <!-- ТЕКСТЫ ИНТЕРФЕЙСА -->
    <div class="section">
        <h2 id="lbl-texts-sec">📝 Игровые тексты</h2>
        <div class="form-group"><label id="lbl-start-title">Стартовый экран: Заголовок</label><input type="text" id="t-start-title"></div>
        <div class="form-group"><label id="lbl-start-desc">Стартовый экран: Описание</label><textarea id="t-start-desc" rows="2"></textarea></div>
        <div class="row">
            <div class="col"><label id="lbl-btn-start">Кнопка СТАРТ</label><input type="text" id="t-btn-start"></div>
            <div class="col"><label id="lbl-btn-restart">Кнопка РЕСТАРТ</label><input type="text" id="t-btn-restart"></div>
        </div><br>
        <div class="row"><div class="col"><label id="lbl-prog">Текст: Вопрос N из M</label><input type="text" id="t-progress"></div></div>
    </div>

    <!-- ФИДБЕК УДАРОВ -->
    <div class="section">
        <h2 id="lbl-hit-sec">💥 Тексты реакции на удар</h2>
        <div class="row"><div class="col"><label id="lbl-hit-perf">Идеально</label><input type="text" id="t-hit-perfect"></div><div class="col"><label id="lbl-hit-good">Отлично</label><input type="text" id="t-hit-good"></div></div><br>
        <div class="row"><div class="col"><label id="lbl-hit-wrong">Ошибка</label><input type="text" id="t-hit-wrong"></div><div class="col"><label id="lbl-hit-miss">Промах</label><input type="text" id="t-hit-miss"></div><div class="col"><label id="lbl-combo">Слово: КОМБО</label><input type="text" id="t-combo"></div></div>
    </div>

    <!-- ФИНАЛЬНЫЙ ЭКРАН -->
    <div class="section">
        <h2 id="lbl-fin-sec">🏆 Финальный экран</h2>
        <div class="row"><div class="col"><label id="lbl-fin-win">Текст Победы</label><input type="text" id="t-fin-win"></div><div class="col"><label id="lbl-stat-row">Приписка "подряд"</label><input type="text" id="t-stat-row"></div></div><br>
        <div class="row">
            <div class="col"><label id="lbl-s1">Идеально</label><input type="text" id="t-stat-1"></div>
            <div class="col"><label id="lbl-s2">Отлично</label><input type="text" id="t-stat-2"></div>
            <div class="col"><label id="lbl-s3">Ошибки</label><input type="text" id="t-stat-3"></div>
            <div class="col"><label id="lbl-s4">Макс Комбо</label><input type="text" id="t-stat-4"></div>
        </div>
    </div>

    <!-- ВОПРОСЫ -->
    <div class="section">
        <h2 id="lbl-q-sec">❓ Вопросы и ответы</h2>
        <div id="questions-wrapper"></div>
        <button class="btn-add" id="btn-add-q" onclick="addQuestion()">+ ДОБАВИТЬ ВОПРОС</button>
    </div>

    <button class="btn-generate" id="btn-gen" onclick="generateLink()">СГЕНЕРИРОВАТЬ ИГРУ 🚀</button>

    <!-- ВЫДАЧА КОДА И ССЫЛКИ -->
    <div id="output-area">
        <h2 style="margin-top:0; color:#27ae60;">✅ Ваша игра готова!</h2>
        <p><b>1. Прямая ссылка (чтобы отправить ученикам или проверить самому):</b></p>
        <textarea id="direct-link" class="code-box" style="height: 60px;" readonly></textarea>
        <button class="copy-btn" onclick="copyCode('direct-link')">📋 Скопировать ссылку</button>

        <p style="margin-top:20px;"><b>2. Код для вставки в Genially (Insert -> Other -> Iframe):</b></p>
        <textarea id="iframe-code" class="code-box" readonly></textarea>
        <button class="copy-btn" onclick="copyCode('iframe-code')">📋 Скопировать код Iframe</button>
    </div>
</div>

    let questionCounter = 0;

    function changeLanguage() {
        const lang = document.getElementById('lang-select').value;
        const u = i18n[lang].ui; const g = i18n[lang].game;

        document.getElementById('lbl-title').innerText = u.title; document.getElementById('lbl-lang-sec').innerText = u.lang;
        document.getElementById('lbl-design-sec').innerText = u.design; document.getElementById('lbl-font').innerText = u.font;
        document.getElementById('lbl-color').innerText = u.color; document.getElementById('lbl-bg').innerText = u.bg;
        document.getElementById('lbl-opacity').innerText = u.opacity; document.getElementById('lbl-texts-sec').innerText = u.texts;
        document.getElementById('lbl-start-title').innerText = u.stTitle; document.getElementById('lbl-start-desc').innerText = u.stDesc;
        document.getElementById('lbl-btn-start').innerText = u.btnStart; document.getElementById('lbl-btn-restart').innerText = u.btnRestart;

        document.getElementById('lbl-hit-perf').innerText = u.hitPerf; document.getElementById('lbl-hit-good').innerText = u.hitGood;

        document.getElementById('btn-gen').innerText = u.gen;

        document.getElementById('t-start-title').value = g.st; document.getElementById('t-start-desc').value = g.sd;
        document.getElementById('t-btn-start').value = g.bs; document.getElementById('t-btn-restart').value = g.br;
        document.getElementById('t-progress').value = g.pr; document.getElementById('t-hit-perfect').value = g.hp;
        document.getElementById('t-hit-good').value = g.hg; document.getElementById('t-hit-wrong').value = g.hw;
        document.getElementById('t-hit-miss').value = g.hm; document.getElementById('t-combo').value = g.cmb;
        document.getElementById('t-fin-win').value = g.fw; document.getElementById('t-stat-row').value = g.sr;

        document.getElementById('t-stat-3').value = g.s3; document.getElementById('t-stat-4').value = g.s4;

        document.querySelectorAll('.question-block').forEach((b, idx) => {
            b.querySelector('h4').innerText = `${u.qSec.split(' ')[0]} ${idx + 1}`;
            b.querySelector('.remove-btn').innerText = u.del;
            b.querySelector('.q-text').placeholder = u.qPh;
            b.querySelector('.q-opt-0').placeholder = `${u.oPh} 1`;
            b.querySelector('.q-opt-1').placeholder = `${u.oPh} 2`;
            b.querySelector('.q-opt-2').placeholder = `${u.oPh} 3`;
            const s = b.querySelector('.correct-select'); const v = s.value;
            s.options[0].text = `${u.cAns} 1`; s.options[1].text = `${u.cAns} 2`; s.options[2].text = `${u.cAns} 3`;
            s.value = v;
        });
    }

    function addQuestion() {
        questionCounter++; const lang = document.getElementById('lang-select').value; const u = i18n[lang].ui;
        const div = document.createElement('div'); div.className = 'question-block';
        div.innerHTML = `<h4>${u.qSec.split(' ')[0]} ${questionCounter}</h4><button class="remove-btn" onclick="this.parentElement.remove()">${u.del}</button><div class="form-group"><input type="text" class="q-text" placeholder="${u.qPh}"></div><div class="options-grid"><input type="text" class="q-opt-0" placeholder="${u.oPh} 1"><input type="text" class="q-opt-1" placeholder="${u.oPh} 2"><input type="text" class="q-opt-2" placeholder="${u.oPh} 3"></div><select class="correct-select"><option value="0">${u.cAns} 1</option><option value="1">${u.cAns} 2</option><option value="2">${u.cAns} 3</option></select>`;
        document.getElementById('questions-wrapper').appendChild(div);
    }

    function hexToRgb(hex) {
        let r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? `${parseInt(r[1], 16)}, ${parseInt(r[2], 16)}, ${parseInt(r[3], 16)}` : "255, 255, 255";
    }

    // МАГИЯ ЗДЕСЬ: Редактор сам вычисляет ссылку на game.html
    function generateLink() {
        const qBlocks = document.querySelectorAll('.question-block');
        if (qBlocks.length === 0) { alert('Добавьте хотя бы 1 вопрос!'); return; }
        
        const config = {
            design: { font: document.getElementById('cfg-font').value, color: document.getElementById('cfg-color').value, bg: hexToRgb(document.getElementById('cfg-bg').value), op: document.getElementById('cfg-opacity').value / 100 },
            questions: Array.from(qBlocks).map(b => ({ q: b.querySelector('.q-text').value, opt: [ b.querySelector('.q-opt-0').value, b.querySelector('.q-opt-1').value, b.querySelector('.q-opt-2').value ], c: parseInt(b.querySelector('.correct-select').value) })),
            texts: { st: document.getElementById('t-start-title').value, sd: document.getElementById('t-start-desc').value, bs: document.getElementById('t-btn-start').value, br: document.getElementById('t-btn-restart').value, pr: document.getElementById('t-progress').value, hp: document.getElementById('t-hit-perfect').value, hg: document.getElementById('t-hit-good').value, hw: document.getElementById('t-hit-wrong').value, hm: document.getElementById('t-hit-miss').value, cmb: document.getElementById('t-combo').value, fw: document.getElementById('t-fin-win').value, sr: document.getElementById('t-stat-row').value, s1: document.getElementById('t-stat-1').value, s2: document.getElementById('t-stat-2').value, s3: document.getElementById('t-stat-3').value, s4: document.getElementById('t-stat-4').value }
        };

        // Кодируем данные в строку
        const encodedData = encodeURIComponent(btoa(encodeURIComponent(JSON.stringify(config))));
        
        // Узнаем текущую ссылку редактора и меняем "editor.html" на "game.html"
        let currentUrl = window.location.href.split('?')[0];
        let gameUrl = currentUrl.replace('editor.html', 'game.html') + '?data=' + encodedData;

        // Выводим результат
        document.getElementById('direct-link').value = gameUrl;
        document.getElementById('iframe-code').value = `<iframe src="${gameUrl}" width="100%" height="720px" frameborder="0" allowfullscreen style="border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></iframe>`;
        document.getElementById('output-area').style.display = 'block';
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyCode(id) {
        const ta = document.getElementById(id);
        ta.select(); document.execCommand('copy');
        alert('Скопировано!');
    }

    window.onload = () => { changeLanguage(); addQuestion(); }
</script>
</body>
