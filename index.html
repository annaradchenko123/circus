<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Силомер (16:9)</title>
    <style>
        /* Базовые стили центрирования на экране */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Главный контейнер игры - Строгий формат 16:9 */
        #game-wrapper {
            width: 100%;
            max-width: 1280px; /* Максимальная ширина */
            aspect-ratio: 16 / 9; /* Пропорция Genially */
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f172a 100%);
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 2px solid #334155;
        }

        /* ЛЕВАЯ ПАНЕЛЬ: Силомер (35% ширины) */
        #left-panel {
            width: 35%;
            height: 100%;
            /* СЮДА В БУДУЩЕМ ВСТАВИМ ВАШУ КАРТИНКУ СИЛОМЕРА */
            /* background-image: url('ваша_картинка.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom center; */
            background-color: rgba(0, 0, 0, 0.4);
            border-right: 2px dashed #475569;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 10px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* Табло счета на силомере */
        #score-display {
            background-color: #000;
            color: #0f0;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 2.5rem;
            border: 4px solid #333;
            box-shadow: inset 0 0 10px #0f0;
        }

        /* Шкала силомера (труба, по которой бегает ползунок) */
        #track {
            flex-grow: 1;
            width: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #cbd5e1;
            border-right: 4px solid #cbd5e1;
            border-radius: 20px;
            margin: 30px 0;
            position: relative;
        }

        /* Ползунок */
        #slider {
            position: absolute;
            width: 160%;
            left: -30%;
            height: 24px;
            background-color: #e94560;
            border-radius: 12px;
            box-shadow: 0 0 15px #e94560, inset 0 0 5px rgba(255,255,255,0.8);
            z-index: 5;
        }

        /* Линия-указатель от ползунка к ответам */
        #slider-pointer {
            position: absolute;
            width: 800px; /* Длинная линия вправо */
            height: 2px;
            background: linear-gradient(90deg, #e94560 0%, rgba(233, 69, 96, 0) 100%);
            top: 50%;
            left: 100%;
            transform: translateY(-50%);
            pointer-events: none; /* Чтобы не мешала кликать */
            z-index: 1;
        }

        /* Кнопка удара */
        #hammer-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff4757 0%, #c0392b 100%);
            border: 8px solid #7f8c8d;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 15px 0 #8e44ad, 0 20px 25px rgba(0,0,0,0.6);
            transition: all 0.1s;
            flex-shrink: 0;
            z-index: 10;
        }
        #hammer-btn:active { transform: translateY(15px); box-shadow: 0 0 0 #8e44ad, 0 5px 10px rgba(0,0,0,0.6); }
        #hammer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; }

        /* ПРАВАЯ ПАНЕЛЬ: Вопросы и ответы (65% ширины) */
        #right-panel {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* Верхняя часть с прогрессом и вопросом */
        #header-info { text-align: right; color: #94a3b8; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        #question-display {
            background-color: white;
            color: #1e293b;
            padding: 25px;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            border: 5px solid #f59e0b;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Контейнер вариантов ответов */
        #answers-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Равномерно распределяет ответы по высоте */
            padding-left: 20px;
        }

        .answer-slot {
            background-color: #334155;
            border: 3px solid #64748b;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        /* Фидбек (Отлично/Промах) */
        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        #feedback-text { font-size: 5rem; font-weight: bold; text-align: center; text-transform: uppercase; text-shadow: 0 0 20px currentColor; margin-bottom: 20px; }
        #feedback-points { font-size: 3.5rem; font-family: monospace; font-weight: bold; background: #000; padding: 10px 30px; border-radius: 15px; }

        /* Финальный экран */
        #final-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; display: none; }
        #final-screen h2 { font-size: 4rem; margin: 0; color: #f8fafc; }
        .restart-btn { margin-top: 40px; padding: 20px 50px; background-color: #e94560; color: white; border: none; border-radius: 15px; font-size: 1.8rem; font-weight: bold; cursor: pointer; transition: transform 0.2s; box-shadow: 0 10px 0 #c0392b; }
        .restart-btn:hover { transform: scale(1.05); }
        .restart-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #c0392b; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <!-- Левая панель: Силомер -->
    <div id="left-panel">
        <div id="score-display">0</div>
        
        <div id="track">
            <div id="slider">
                <!-- Лазерная указка -->
                <div id="slider-pointer"></div>
            </div>
        </div>

        <button id="hammer-btn">УДАР!</button>
    </div>

    <!-- Правая панель: Вопросы и ответы -->
    <div id="right-panel">
        <div id="header-info">Вопрос: <span id="progress">1/3</span></div>
        <div id="question-display">Загрузка вопроса...</div>
        
        <div id="answers-container">
            <!-- Сюда JS вставляет варианты ответов -->
        </div>
    </div>

    <!-- Экраны обратной связи и финала -->
    <div id="feedback-overlay">
        <div id="feedback-text">ОТЛИЧНО!</div>
        <div id="feedback-points">+100</div>
    </div>

    <div id="final-screen">
        <h2>ИГРА ЗАВЕРШЕНА</h2>
        <div id="final-score" style="font-size: 6rem; font-family: monospace; color: #0f0; margin: 20px 0;">1200</div>
        <div id="final-rank" style="color: #f59e0b; font-size: 3rem; text-transform: uppercase; font-weight: bold;">Мастер силы!</div>
        <button class="restart-btn" onclick="initGame()">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    // КОНФИГУРАЦИЯ (Будет настраиваться в Genially)
    const gameConfig = {
        sliderSpeedMultiplier: 1.5,
        points: { perfect: 100, good: 70, wrong: -80, miss: -50 },
        questions: [
            { text: "Какая планета самая большая в Солнечной системе?", options: ["Земля", "Марс", "Юпитер", "Сатурн"], correctIndex: 2 },
            { text: "Сколько будет 7 умножить на 8?", options: ["54", "56", "64"], correctIndex: 1 },
            { text: "В каком году человек впервые полетел в космос?", options: ["1957", "1961", "1969", "1975"], correctIndex: 1 }
        ],
        ranks: [
            { minScore: 0, title: "Новичок" },
            { minScore: 150, title: "Эксперт" },
            { minScore: 250, title: "Мастер силы!" }
        ]
    };

    // ПЕРЕМЕННЫЕ ДВИЖКА
    let currentQuestionIndex = 0;
    let score = 0;
    let animationFrameId;
    let sliderY = 0;
    let direction = 1; // 1 = вниз, -1 = вверх
    let isPlaying = false;
    let sliderSpeed = 4 * gameConfig.sliderSpeedMultiplier;

    // DOM ЭЛЕМЕНТЫ
    const ui = {
        progress: document.getElementById('progress'),
        score: document.getElementById('score-display'),
        question: document.getElementById('question-display'),
        answersBox: document.getElementById('answers-container'),
        track: document.getElementById('track'),
        slider: document.getElementById('slider'),
        btn: document.getElementById('hammer-btn'),
        feedback: document.getElementById('feedback-overlay'),
        fText: document.getElementById('feedback-text'),
        fPoints: document.getElementById('feedback-points'),
        finalScreen: document.getElementById('final-screen'),
        finalScore: document.getElementById('final-score'),
        finalRank: document.getElementById('final-rank')
    };

    function initGame() {
        currentQuestionIndex = 0;
        score = 0;
        ui.score.innerText = score;
        ui.finalScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= gameConfig.questions.length) {
            endGame();
            return;
        }

        const qData = gameConfig.questions[currentQuestionIndex];
        ui.progress.innerText = `${currentQuestionIndex + 1} / ${gameConfig.questions.length}`;
        ui.question.innerText = qData.text;

        // Генерация ответов
        ui.answersBox.innerHTML = '';
        qData.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'answer-slot';
            div.innerText = opt;
            div.dataset.index = index;
            ui.answersBox.appendChild(div);
        });

        // Сброс бегунка
        sliderY = 0;
        direction = 1;
        ui.btn.disabled = false;
        ui.feedback.style.opacity = '0';
        
        isPlaying = true;
        animateSlider();
    }

    function animateSlider() {
        if (!isPlaying) return;

        // Вычисляем границы движения по трубе
        const maxH = ui.track.clientHeight - ui.slider.clientHeight;
        sliderY += sliderSpeed * direction;

        // Отскок от краев
        if (sliderY >= maxH) {
            sliderY = maxH;
            direction = -1;
        } else if (sliderY <= 0) {
            sliderY = 0;
            direction = 1;
        }

        ui.slider.style.top = `${sliderY}px`;
        animationFrameId = requestAnimationFrame(animateSlider);
    }

    ui.btn.addEventListener('mousedown', () => { // mousedown реагирует быстрее click
        if (!isPlaying) return;
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        ui.btn.disabled = true;
        checkHit();
    });

    function checkHit() {
        const sliderRect = ui.slider.getBoundingClientRect();
        // Используем центр красной линии указки для проверки
        const hitLineY = sliderRect.top + (sliderRect.height / 2); 
        
        const slots = document.querySelectorAll('.answer-slot');
        let hitIndex = -1;
        let accuracy = 0;

        slots.forEach((slot, index) => {
            const rect = slot.getBoundingClientRect();
            // Если горизонтальный лазер пересекает карточку ответа
            if (hitLineY >= rect.top && hitLineY <= rect.bottom) {
                hitIndex = index;
                const slotCenter = rect.top + (rect.height / 2);
                const maxDeviation = rect.height / 2;
                const deviation = Math.abs(slotCenter - hitLineY);
                accuracy = 1 - (deviation / maxDeviation); // от 0 до 1 (1 = идеально в центр)
            }
        });

        processResult(hitIndex, accuracy);
    }

    function processResult(hitIndex, accuracy) {
        const correctIndex = gameConfig.questions[currentQuestionIndex].correctIndex;
        let pointsEarned = 0;
        let message = "";
        let color = "";

        // Визуальная подсветка выбранного ответа
        const slots = document.querySelectorAll('.answer-slot');
        if (hitIndex !== -1) {
            slots[hitIndex].style.transform = 'scale(1.05)';
            slots[hitIndex].style.borderWidth = '6px';
        }

        if (hitIndex === -1) {
            pointsEarned = gameConfig.points.miss;
            message = "ПРОМАХ!";
            color = "#94a3b8"; // Серый
        } else if (hitIndex === correctIndex) {
            slots[hitIndex].style.borderColor = "#22c55e"; // Зеленый
            slots[hitIndex].style.backgroundColor = "#166534";
            if (accuracy > 0.6) { 
                pointsEarned = gameConfig.points.perfect;
                message = "ИДЕАЛЬНО!";
                color = "#22c55e";
            } else { 
                pointsEarned = gameConfig.points.good;
                message = "ОТЛИЧНО!";
                color = "#eab308";
            }
        } else {
            slots[hitIndex].style.borderColor = "#ef4444"; // Красный
            slots[hitIndex].style.backgroundColor = "#7f1d1d";
            pointsEarned = gameConfig.points.wrong;
            message = "НЕВЕРНО!";
            color = "#ef4444";
        }

        updateScore(pointsEarned);
        showFeedback(message, pointsEarned, color);

        // Пауза перед следующим вопросом
        setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion();
        }, 2000); // 2 секунды на просмотр результата
    }

    function updateScore(points) {
        score += points;
        if(score < 0) score = 0;
        ui.score.innerText = score;
    }

    function showFeedback(msg, points, color) {
        ui.fText.innerText = msg;
        ui.fText.style.color = color;
        ui.fPoints.innerText = points > 0 ? `+${points}` : points;
        ui.fPoints.style.color = color;
        ui.feedback.style.opacity = '1';
    }

    function endGame() {
        ui.finalScreen.style.display = 'flex';
        ui.finalScore.innerText = score;
        
        let rankStr = gameConfig.ranks[0].title;
        for (let i = gameConfig.ranks.length - 1; i >= 0; i--) {
            if (score >= gameConfig.ranks[i].minScore) {
                rankStr = gameConfig.ranks[i].title;
                break;
            }
        }
        ui.finalRank.innerText = rankStr;
    }

    // Старт игры
    initGame();
</script>
</body>
</html>
