<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Силомер</title>
    <!-- Подключаем библиотеку для салюта/хлопушки -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Ubuntu:wght@400;700&display=swap');

        body { 
            font-family: 'Ubuntu', sans-serif; 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }
        
        /* Главный контейнер 16:9 с фоном цирка */
        #game-wrapper {
            width: 100%;
            max-width: 1280px; 
            aspect-ratio: 16 / 9; 
            background-image: url('https://i.postimg.cc/HsxzZ6mn/image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .overlay-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        /* ЛЕВАЯ ПАНЕЛЬ: Автомат-силомер */
        #left-panel {
            width: 35%; 
            height: 100%;
            position: relative;
            z-index: 2;
        }

        /* Контейнер с вашей картинкой силомера */
        #silomer-machine {
            position: absolute;
            width: 100%;
            height: 90%;
            bottom: 5%;
            background-image: url('https://i.postimg.cc/L5YGK6LG/11-(10).png');
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        /* Табло счета на автомате */
        #score-display {
            position: absolute;
            top: 13%; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #111;
            color: #ffd700;
            padding: 10px 25px;
            border-radius: 10px;
            font-family: 'Russo One', sans-serif;
            font-size: 3rem;
            border: 4px solid #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.8), inset 0 0 10px #000;
            transition: transform 0.2s;
            z-index: 10;
        }
        .score-anim { transform: translate(-50%, 0) scale(1.3) !important; color: #fff !important; }

        /* НАСТРОЙКА ШКАЛЫ (Невидимая труба для бегунка) */
        #track {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 26%;      
            height: 50%;   
            width: 10px;
            background: rgba(255, 255, 255, 0.05); 
            z-index: 5;
        }

        /* Ограничитель (бегунок) */
        #slider {
            position: absolute;
            width: 70px;
            left: -30px;
            height: 34px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border-radius: 17px;
            border: 3px solid white;
            box-shadow: 0 0 20px #ff4757;
            z-index: 6;
        }

        /* Лазерный луч вправо */
        #slider-pointer {
            position: absolute;
            width: 1000px;
            height: 4px;
            background: linear-gradient(90deg, rgba(255, 71, 87, 1) 0%, rgba(255, 71, 87, 0) 100%);
            top: 50%;
            left: 100%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 10px #ff4757;
        }

        /* НОВАЯ КНОПКА (КАРТИНКА) */
        #hammer-btn {
            position: absolute;
            bottom: 2%; /* Ровно внизу автомата */
            left: 50%;
            transform: translateX(-50%);
            width: 85px;  /* Уменьшенный размер */
            height: 85px; 
            background-color: transparent;
            background-image: url('https://i.postimg.cc/fbd6rbjh/11-(11).png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            /* Убираем синюю обводку при клике в некоторых браузерах */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* Анимация нажатия - кнопка вдавливается вниз */
        #hammer-btn:active { 
            transform: translate(-50%, 8px) scale(0.95); 
        }
        #hammer-btn:disabled { 
            filter: grayscale(100%); 
            cursor: not-allowed; 
        }

        /* ПРАВАЯ ПАНЕЛЬ: Вопросы и ответы */
        #right-panel {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 60px 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* Прогресс-бар */
        #progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 15px; margin-bottom: 20px; border: 2px solid #555; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #f39c12); transition: width 0.3s ease; }
        #progress-text { text-align: right; color: #f1c40f; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase; }

        #question-display {
            background-color: rgba(255, 255, 255, 0.95);
            color: #2c3e50;
            padding: 20px 30px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            border: 6px solid #f39c12;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Контейнер ответов привязан к высоте шкалы слева */
        #answers-container {
            position: absolute;
            left: 20px;
            width: calc(100% - 80px);
        }

        .answer-slot {
            position: absolute;
            width: 100%;
            left: 0;
            background-color: rgba(255, 255, 255, 0.9);
            border: 4px solid #34495e;
            color: #2c3e50;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: 700;
            border-radius: 15px;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transform: translateY(-50%); 
            z-index: 3;
            box-sizing: border-box;
        }

        /* Фидбек (Отлично/Промах) */
        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #feedback-text { font-family: 'Russo One', sans-serif; font-size: 6rem; text-align: center; text-transform: uppercase; text-shadow: 0 0 20px #000, 4px 4px 0 #000; margin-bottom: 10px; }
        #feedback-points { font-family: 'Russo One', sans-serif; font-size: 4rem; background: rgba(0,0,0,0.8); padding: 10px 40px; border-radius: 20px; border: 4px solid currentColor; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Финальный экран */
        #final-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; display: none; text-align: center; }
        #final-screen h2 { font-family: 'Russo One', sans-serif; font-size: 5rem; margin: 0; color: #fff; text-transform: uppercase; text-shadow: 0 0 20px #e94560; }
        #final-score { font-family: 'Russo One', sans-serif; font-size: 8rem; color: #ffd700; margin: 20px 0; text-shadow: 0 0 30px #f39c12; }
        #final-rank { color: #2ecc71; font-size: 3.5rem; text-transform: uppercase; font-weight: bold; margin-bottom: 40px;}
        .restart-btn { padding: 20px 60px; background-color: #e94560; color: white; border: 6px solid #fff; border-radius: 30px; font-family: 'Russo One', sans-serif; font-size: 2.5rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 0 #c0392b; text-transform: uppercase; }
        .restart-btn:hover { transform: scale(1.05); }
        .restart-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #c0392b; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="overlay-bg"></div>

    <div id="left-panel">
        <div id="silomer-machine">
            <div id="score-display">0</div>
            <div id="track">
                <div id="slider"><div id="slider-pointer"></div></div>
            </div>
            <!-- В кнопке теперь нет текста, только картинка в CSS -->
            <button id="hammer-btn" aria-label="Удар молотком"></button>
        </div>
    </div>

    <div id="right-panel">
        <div id="progress-text">Вопрос <span id="progress-num">1</span> из 12</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        
        <div id="question-display">Загрузка...</div>
        <div id="answers-container"></div>
    </div>

    <div id="feedback-overlay">
        <div id="feedback-text"></div>
        <div id="feedback-points"></div>
    </div>

    <div id="final-screen">
        <h2>ИГРА ЗАВЕРШЕНА</h2>
        <div id="final-score">1200</div>
        <div id="final-rank">Мастер силы!</div>
        <button class="restart-btn" onclick="initGame()">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    // ГЕНЕРАТОР ЗВУКОВ ПО ТЗ (Синтезатор, чтобы браузер не блокировал файлы)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'hit') { 
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
            gainNode.gain.setValueAtTime(1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'success') { 
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554.37, now + 0.1);
            osc.frequency.setValueAtTime(659.25, now + 0.2);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'error') { 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.4);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    // КОНФИГУРАЦИЯ (Очки строго по ТЗ, 12 вопросов, по 3 варианта)
    const gameConfig = {
        sliderSpeedMultiplier: 1.5,
        points: { perfect: 100, good: 70, wrong: -80, miss: -50 },
        questions: [
            { text: "Какая планета самая большая в Солнечной системе?", options: ["Земля", "Марс", "Юпитер"], correctIndex: 2 },
            { text: "Сколько будет 7 умножить на 8?", options: ["54", "56", "64"], correctIndex: 1 },
            { text: "В каком году человек впервые полетел в космос?", options: ["1957", "1961", "1969"], correctIndex: 1 },
            { text: "Какой океан самый большой на Земле?", options: ["Атлантический", "Индийский", "Тихий"], correctIndex: 2 },
            { text: "Самый твердый минерал в природе?", options: ["Кварц", "Алмаз", "Изумруд"], correctIndex: 1 },
            { text: "Сколько материков на планете Земля?", options: ["4", "5", "6"], correctIndex: 2 },
            { text: "Какая химическая формула у воды?", options: ["CO2", "H2O", "O2"], correctIndex: 1 },
            { text: "Столица Австралии?", options: ["Сидней", "Мельбурн", "Канберра"], correctIndex: 2 },
            { text: "Кто написал произведение «Муму»?", options: ["Пушкин", "Тургенев", "Толстой"], correctIndex: 1 },
            { text: "Самая длинная река в мире?", options: ["Нил", "Амазонка", "Янцзы"], correctIndex: 1 },
            { text: "Какой газ мы вдыхаем для жизни?", options: ["Азот", "Кислород", "Углекислый газ"], correctIndex: 1 },
            { text: "Столица Японии?", options: ["Пекин", "Сеул", "Токио"], correctIndex: 2 }
        ],
        ranks: [
            { minScore: 0, title: "Новичок" },
            { minScore: 500, title: "Эксперт" },
            { minScore: 1000, title: "Мастер силы!" } 
        ]
    };

    let currentQuestionIndex = 0;
    let score = 0;
    let animationFrameId;
    let laserY = 0; 
    let direction = 1; 
    let isPlaying = false;
    let sliderSpeed = 5 * gameConfig.sliderSpeedMultiplier;

    const ui = {
        progNum: document.getElementById('progress-num'),
        progBar: document.getElementById('progress-bar'),
        score: document.getElementById('score-display'),
        question: document.getElementById('question-display'),
        answersBox: document.getElementById('answers-container'),
        track: document.getElementById('track'),
        slider: document.getElementById('slider'),
        btn: document.getElementById('hammer-btn'),
        feedback: document.getElementById('feedback-overlay'),
        fText: document.getElementById('feedback-text'),
        fPoints: document.getElementById('feedback-points'),
        finalScreen: document.getElementById('final-screen'),
        finalScore: document.getElementById('final-score'),
        finalRank: document.getElementById('final-rank')
    };

    // Авто-выравнивание ответов под высоту трубы автомата
    function alignAnswersContainer() {
        const trackRect = ui.track.getBoundingClientRect();
        const rightPanelRect = document.getElementById('right-panel').getBoundingClientRect();
        
        ui.answersBox.style.top = (trackRect.top - rightPanelRect.top) + 'px';
        ui.answersBox.style.height = trackRect.height + 'px';
    }
    window.addEventListener('resize', alignAnswersContainer);

    function initGame() {
        currentQuestionIndex = 0;
        score = 0;
        updateScoreDisplay(0);
        ui.finalScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= gameConfig.questions.length) { endGame(); return; }

        const qData = gameConfig.questions[currentQuestionIndex];
        
        // Обновляем прогресс (12 делений по ТЗ)
        ui.progNum.innerText = currentQuestionIndex + 1;
        ui.progBar.style.width = `${((currentQuestionIndex) / gameConfig.questions.length) * 100}%`;
        ui.question.innerText = qData.text;

        ui.answersBox.innerHTML = '';
        alignAnswersContainer();

        qData.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'answer-slot';
            div.innerText = opt;
            div.dataset.index = index;
            div.style.top = (index * (100 / (qData.options.length - 1))) + '%';
            ui.answersBox.appendChild(div);
        });

        ui.btn.disabled = false;
        ui.feedback.style.opacity = '0';
        ui.feedback.style.backdropFilter = 'none';
        
        laserY = 0;
        direction = 1;
        ui.slider.style.top = (laserY - (ui.slider.clientHeight / 2)) + 'px';
        
        isPlaying = true;
        animateSlider();
    }

    function animateSlider() {
        if (!isPlaying) return;

        const trackHeight = ui.track.clientHeight;
        laserY += sliderSpeed * direction;

        if (laserY >= trackHeight) { laserY = trackHeight; direction = -1; } 
        else if (laserY <= 0) { laserY = 0; direction = 1; }

        ui.slider.style.top = (laserY - (ui.slider.clientHeight / 2)) + 'px';
        animationFrameId = requestAnimationFrame(animateSlider);
    }

    function handleHit(e) {
        if(e) e.preventDefault();
        if (!isPlaying) return;
        playSound('hit');
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        ui.btn.disabled = true;
        checkHit();
    }

    ui.btn.addEventListener('mousedown', handleHit);
    ui.btn.addEventListener('touchstart', handleHit);

    function checkHit() {
        const trackHeight = ui.track.clientHeight;
        const optsCount = gameConfig.questions[currentQuestionIndex].options.length;
        const slotDistance = trackHeight / (optsCount - 1);
        const maxDeviation = slotDistance / 2; 

        let hitIndex = -1;
        let accuracy = 0;

        // Определяем попадание
        for(let i=0; i<optsCount; i++) {
            const slotCenterY = i * slotDistance;
            const deviation = Math.abs(slotCenterY - laserY);
            
            if (deviation <= maxDeviation) {
                hitIndex = i;
                accuracy = 1 - (deviation / maxDeviation); 
                break;
            }
        }

        processResult(hitIndex, accuracy);
    }

    function processResult(hitIndex, accuracy) {
        const correctIndex = gameConfig.questions[currentQuestionIndex].correctIndex;
        let pointsEarned = 0;
        let message = "";
        let color = "";

        const slots = document.querySelectorAll('.answer-slot');
        if (hitIndex !== -1) {
            slots[hitIndex].style.transform = 'translateY(-50%) scale(1.05)';
        }

        // Логика начисления очков строго по ТЗ
        if (hitIndex === -1) {
            pointsEarned = gameConfig.points.miss; // -50
            message = "ПОПРОБУЙ ЕЩЁ!";
            color = "#bdc3c7"; 
            playSound('error');
        } else if (hitIndex === correctIndex) {
            slots[hitIndex].style.borderColor = "#2ecc71"; 
            slots[hitIndex].style.backgroundColor = "#e8f8f5";
            playSound('success');
            fireConfetti(); 

            if (accuracy > 0.6) { 
                pointsEarned = gameConfig.points.perfect; // +100 (идеальное время)
                message = "ИДЕАЛЬНО!";
                color = "#2ecc71";
            } else { 
                pointsEarned = gameConfig.points.good; // +70 (небольшое опоздание)
                message = "ОТЛИЧНО!";
                color = "#f1c40f";
            }
        } else {
            slots[hitIndex].style.borderColor = "#e74c3c"; 
            slots[hitIndex].style.backgroundColor = "#fdedec";
            pointsEarned = gameConfig.points.wrong; // -80
            message = "ПОЧТИ!";
            color = "#e74c3c";
            playSound('error'); 
        }

        updateScoreDisplay(pointsEarned);
        showFeedback(message, pointsEarned, color);

        setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion();
        }, 2000); 
    }

    // Обновление счета с анимацией увеличения
    function updateScoreDisplay(points) {
        score += points;
        if(score < 0) score = 0; 
        ui.score.innerText = score;
        if(points !== 0) {
            ui.score.classList.add('score-anim');
            setTimeout(() => ui.score.classList.remove('score-anim'), 300);
        }
    }

    function showFeedback(msg, points, color) {
        ui.fText.innerText = msg;
        ui.fText.style.color = color;
        ui.fPoints.innerText = points > 0 ? `+${points}` : points;
        ui.fPoints.style.color = color;
        ui.fPoints.style.borderColor = color;
        ui.feedback.style.opacity = '1';
        ui.feedback.style.backdropFilter = 'blur(4px)';
    }

    function fireConfetti() {
        confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 }, colors: ['#ff4757', '#f1c40f', '#2ecc71', '#3498db'] });
    }

    function endGame() {
        ui.progBar.style.width = '100%';
        ui.finalScreen.style.display = 'flex';
        ui.finalScore.innerText = score;
        
        let rankStr = gameConfig.ranks[0].title;
        for (let i = gameConfig.ranks.length - 1; i >= 0; i--) {
            if (score >= gameConfig.ranks[i].minScore) {
                rankStr = gameConfig.ranks[i].title;
                break;
            }
        }
        ui.finalRank.innerText = rankStr;
        fireConfetti();
        setTimeout(fireConfetti, 500);
    }

    initGame();
</script>
</body>
</html>
