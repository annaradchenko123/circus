<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Силомер</title>
    <style>
        /* Базовые стили для ретро-автомата */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 400px; height: 700px; background: linear-gradient(180deg, #16213e 0%, #0f3460 100%); border: 8px solid #e94560; border-radius: 20px; box-shadow: 0 0 20px #e94560; position: relative; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        
        /* Табло и прогресс */
        #header { width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; }
        .digital-display { background-color: #000; color: #0f0; padding: 5px 15px; border-radius: 5px; font-family: monospace; font-size: 1.5rem; }
        
        /* Вопрос */
        #question-display { background-color: #fff; color: #000; width: 100%; min-height: 80px; padding: 15px; border-radius: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; box-sizing: border-box; margin-bottom: 20px; border: 4px solid #f9a826; }
        
        /* Шкала и ползунок */
        #scale-container { flex-grow: 1; width: 100%; position: relative; display: flex; flex-direction: column; justify-content: space-around; margin-bottom: 20px; border-left: 4px solid #fff; border-right: 4px solid #fff; background: rgba(0,0,0,0.3); padding: 10px 0; }
        .answer-slot { background-color: rgba(255, 255, 255, 0.1); border: 2px solid #aaa; padding: 15px; text-align: center; border-radius: 8px; margin: 0 40px; transition: all 0.3s; position: relative; z-index: 1; }
        .answer-slot.correct { border-color: #4cd137; } /* Для теста, потом уберем */
        
        #slider { position: absolute; width: 120%; left: -10%; height: 20px; background-color: #e94560; border-radius: 10px; box-shadow: 0 0 15px #e94560; z-index: 2; /* Управляется через JS */ }
        
        /* Кнопка */
        #hammer-btn { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #ff4757 0%, #ff6b81 100%); border: 8px solid #c0392b; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; color: white; text-transform: uppercase; box-shadow: 0 10px 0 #8e44ad, 0 15px 20px rgba(0,0,0,0.5); transition: all 0.1s; flex-shrink: 0; }
        #hammer-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #8e44ad, 0 5px 10px rgba(0,0,0,0.5); }
        #hammer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; }

        /* Фидбек */
        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #feedback-text { font-size: 3rem; font-weight: bold; text-align: center; text-transform: uppercase; text-shadow: 0 0 10px currentColor; }
        #feedback-points { font-size: 2rem; margin-top: 10px; font-family: monospace; }

        /* Финальный экран */
        #final-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #16213e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; display: none; text-align: center; }
        .restart-btn { margin-top: 30px; padding: 15px 30px; background-color: #e94560; color: white; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div>Вопрос: <span id="progress">1/3</span></div>
        <div class="digital-display" id="score">0</div>
    </div>

    <div id="question-display">Загрузка вопроса...</div>

    <div id="scale-container">
        <div id="slider"></div>
        <!-- Варианты ответов будут генерироваться здесь -->
    </div>

    <button id="hammer-btn">УДАР!</button>

    <div id="feedback-overlay">
        <div id="feedback-text"></div>
        <div id="feedback-points"></div>
    </div>

    <div id="final-screen">
        <h2>Игра завершена!</h2>
        <div class="digital-display" id="final-score" style="font-size: 3rem; margin: 20px 0;">0</div>
        <h3 id="final-rank" style="color: #f9a826; font-size: 1.5rem;">Ранг</h3>
        <button class="restart-btn" onclick="initGame()">Играть снова</button>
    </div>
</div>

<script>
    /* =========================================
       КОНФИГУРАЦИЯ (То, что будет в редакторе Genially)
       ========================================= */
    const gameConfig = {
        sliderSpeedMultiplier: 1.5, // Скорость бегунка
        points: {
            perfect: 100, // Точное попадание
            good: 70,     // Попадание с погрешностью
            wrong: -80,   // Неправильный ответ
            miss: -50     // Промах мимо вариантов
        },
        // Массив вопросов (в прототипе 3, по ТЗ должно быть 12)
        questions: [
            { text: "В каком году человек полетел в космос?", options: ["1957", "1961", "1969", "1975"], correctIndex: 1 },
            { text: "Какая планета самая большая в Солнечной системе?", options: ["Земля", "Марс", "Юпитер"], correctIndex: 2 },
            { text: "Сколько будет 7 умножить на 8?", options: ["54", "56", "64", "48"], correctIndex: 1 }
        ],
        ranks: [
            { minScore: 0, title: "Новичок" },
            { minScore: 150, title: "Эксперт" },
            { minScore: 250, title: "Мастер силы!" } // Настроить под 1200 очков в финале
        ]
    };

    /* =========================================
       ИГРОВОЙ ДВИЖОК
       ========================================= */
    let currentQuestionIndex = 0;
    let score = 0;
    let animationFrameId;
    let sliderY = 0;
    let direction = 1;
    let isPlaying = false;
    let sliderSpeed = 2 * gameConfig.sliderSpeedMultiplier;

    // DOM Элементы
    const ui = {
        progress: document.getElementById('progress'),
        score: document.getElementById('score'),
        question: document.getElementById('question-display'),
        scale: document.getElementById('scale-container'),
        slider: document.getElementById('slider'),
        btn: document.getElementById('hammer-btn'),
        feedback: document.getElementById('feedback-overlay'),
        fText: document.getElementById('feedback-text'),
        fPoints: document.getElementById('feedback-points'),
        finalScreen: document.getElementById('final-screen'),
        finalScore: document.getElementById('final-score'),
        finalRank: document.getElementById('final-rank')
    };

    function initGame() {
        currentQuestionIndex = 0;
        score = 0;
        ui.score.innerText = score;
        ui.finalScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= gameConfig.questions.length) {
            endGame();
            return;
        }

        const qData = gameConfig.questions[currentQuestionIndex];
        ui.progress.innerText = `${currentQuestionIndex + 1} / ${gameConfig.questions.length}`;
        ui.question.innerText = qData.text;

        // Очистка и рендер вариантов ответов
        ui.scale.innerHTML = '<div id="slider"></div>';
        ui.slider = document.getElementById('slider'); // Обновляем ссылку
        
        qData.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'answer-slot';
            div.innerText = opt;
            div.dataset.index = index;
            ui.scale.appendChild(div);
        });

        // Сброс параметров бегунка
        sliderY = 0;
        direction = 1;
        ui.btn.disabled = false;
        ui.feedback.style.opacity = '0';
        
        isPlaying = true;
        animateSlider();
    }

    function animateSlider() {
        if (!isPlaying) return;

        const maxH = ui.scale.clientHeight - ui.slider.clientHeight;
        sliderY += sliderSpeed * direction;

        if (sliderY >= maxH) {
            sliderY = maxH;
            direction = -1;
        } else if (sliderY <= 0) {
            sliderY = 0;
            direction = 1;
        }

        ui.slider.style.top = `${sliderY}px`;
        animationFrameId = requestAnimationFrame(animateSlider);
    }

    ui.btn.addEventListener('click', () => {
        if (!isPlaying) return;
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        ui.btn.disabled = true;

        checkHit();
    });

    function checkHit() {
        const sliderRect = ui.slider.getBoundingClientRect();
        const sliderCenter = sliderRect.top + (sliderRect.height / 2);
        
        const slots = document.querySelectorAll('.answer-slot');
        let hitIndex = -1;
        let accuracy = 0; // 0..1 (где 1 - идеально по центру)

        slots.forEach((slot, index) => {
            const rect = slot.getBoundingClientRect();
            // Проверяем пересечение центра ползунка и блока ответа
            if (sliderCenter >= rect.top && sliderCenter <= rect.bottom) {
                hitIndex = index;
                const slotCenter = rect.top + (rect.height / 2);
                const maxDeviation = rect.height / 2;
                const deviation = Math.abs(slotCenter - sliderCenter);
                accuracy = 1 - (deviation / maxDeviation); // от 0 (край) до 1 (центр)
            }
        });

        processResult(hitIndex, accuracy);
    }

    function processResult(hitIndex, accuracy) {
        const correctIndex = gameConfig.questions[currentQuestionIndex].correctIndex;
        let pointsEarned = 0;
        let message = "";
        let color = "";

        if (hitIndex === -1) {
            // Промах мимо кнопок
            pointsEarned = gameConfig.points.miss;
            message = "ПРОМАХ!";
            color = "#8395a7";
        } else if (hitIndex === correctIndex) {
            // Попал в правильный ответ, проверяем точность (аналог ±0.3 сек)
            if (accuracy > 0.6) { // Близко к центру
                pointsEarned = gameConfig.points.perfect;
                message = "ИДЕАЛЬНО!";
                color = "#4cd137";
            } else { // Зацепил край
                pointsEarned = gameConfig.points.good;
                message = "ОТЛИЧНО!";
                color = "#fbc531";
            }
        } else {
            // Попал в неправильный ответ
            pointsEarned = gameConfig.points.wrong;
            message = "НЕВЕРНО!";
            color = "#e84118";
        }

        updateScore(pointsEarned);
        showFeedback(message, pointsEarned, color);

        // Пауза перед следующим вопросом
        setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion();
        }, 2000);
    }

    function updateScore(points) {
        score += points;
        if(score < 0) score = 0; // Защита от отрицательного счета (опционально)
        ui.score.innerText = score;
    }

    function showFeedback(msg, points, color) {
        ui.fText.innerText = msg;
        ui.fText.style.color = color;
        ui.fPoints.innerText = points > 0 ? `+${points}` : points;
        ui.fPoints.style.color = color;
        
        ui.feedback.style.opacity = '1';
    }

    function endGame() {
        ui.finalScreen.style.display = 'flex';
        ui.finalScore.innerText = score;
        
        // Определение ранга
        let rankStr = gameConfig.ranks[0].title;
        for (let i = gameConfig.ranks.length - 1; i >= 0; i--) {
            if (score >= gameConfig.ranks[i].minScore) {
                rankStr = gameConfig.ranks[i].title;
                break;
            }
        }
        ui.finalRank.innerText = rankStr;
    }

    // Запуск игры
    initGame();
</script>
</body>
</html>
