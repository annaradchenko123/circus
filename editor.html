<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Игры: Силомер</title>
    <!-- Загружаем шрифты для предпросмотра -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Ubuntu:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; }
        
        .main-layout { display: flex; gap: 40px; align-items: flex-start; margin-top: 20px; }
        .left-col { flex: 1; min-width: 0; }
        .right-col { width: 380px; position: sticky; top: 20px; flex-shrink: 0; }

        .section { background: #fafbfc; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .section h2 { margin-top: 0; font-size: 1.2rem; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        
        .question-block { background: #fff; border: 1px solid #d1d5da; padding: 20px; border-radius: 8px; margin-bottom: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-block h4 { margin: 0 0 15px 0; color: #e67e22; font-size: 1.1rem; }
        .remove-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .correct-select { width: 100%; padding: 8px; background-color: #f0f8ff; border-color: #3498db; font-weight: bold; }
        
        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; font-size: 1rem; }
        .btn-generate { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; }
        
        #output-area { margin-top: 30px; display: none; background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #a5d6a7; }
        textarea.code-box { width: 100%; height: 80px; font-family: monospace; padding: 10px; border: 1px solid #a5d6a7; border-radius: 6px; resize: vertical; font-size: 0.9rem; margin-top:5px; }
        .copy-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }

        /* СТИЛИ ПРЕДПРОСМОТРА */
        .preview-title { text-align: center; color: #e67e22; font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        #preview-box {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.3)), url('https://i.postimg.cc/HsxzZ6mn/image.png') center/cover;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 350px;
        }
        #prev-q {
            border: 4px solid #f39c12; border-radius: 15px; padding: 15px 20px;
            font-size: 1.4rem; font-weight: 700; text-align: center; min-height: 70px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .prev-a {
            border: 3px solid #cbd5e1; border-radius: 12px; padding: 12px 20px;
            font-size: 1.2rem; font-weight: 700; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        @media (max-width: 1000px) {
            .main-layout { flex-direction: column; }
            .right-col { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="lbl-title">🛠️ Конструктор Силомера</h1>

    <div class="main-layout">
        
        <!-- ЛЕВАЯ КОЛОНКА (Настройки) -->
        <div class="left-col">
            <div class="section">
                <h2 id="lbl-lang-sec">🌐 Язык и Дизайн</h2>
                <div class="row">
                    <div class="col">
                        <label id="lbl-lang">Язык интерфейса</label>
                        <select id="lang-select" onchange="changeLanguage()">
                            <option value="ru">🇷🇺 Русский</option>
                            <option value="en">🇬🇧 English</option>
                            <option value="es">🇪🇸 Español</option>
                            <option value="de">🇩🇪 Deutsch</option>
                            <option value="fr">🇫🇷 Français</option>
                            <option value="it">🇮🇹 Italiano</option>
                            <option value="zh">🇨🇳 中文</option>
                        </select>
                    </div>
                    <div class="col">
                        <label id="lbl-font">Шрифт игры</label>
                        <select id="cfg-font">
                            <option value="'Ubuntu', sans-serif">Ubuntu</option>
                            <option value="'Montserrat', sans-serif">Montserrat</option>
                            <option value="'Comic Sans MS', cursive">Comic Sans</option>
                            <option value="'Courier New', Courier, monospace">Courier</option>
                        </select>
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="col"><label id="lbl-color">Цвет текста</label><input type="color" id="cfg-color" value="#2c3e50"></div>
                    <div class="col"><label id="lbl-bg">Цвет плашек</label><input type="color" id="cfg-bg" value="#ffffff"></div>
                    <div class="col"><label><span id="lbl-opacity">Прозрачность:</span> <span id="opacity-val">95</span>%</label><input type="range" id="cfg-opacity" min="50" max="100" value="95" oninput="document.getElementById('opacity-val').innerText = this.value"></div>
                </div>
            </div>

            <div class="section">
                <h2 id="lbl-texts-sec">📝 Игровые тексты</h2>
                <div class="row">
                    <div class="col"><label id="lbl-start-title">Заголовок</label><input type="text" id="t-start-title"></div>
                    <div class="col"><label id="lbl-start-hint">Подсказка</label><input type="text" id="t-start-hint"></div>
                </div><br>
                <div class="form-group"><label id="lbl-start-desc">Описание</label><input type="text" id="t-start-desc"></div>
                <div class="row">
                    <div class="col"><label id="lbl-btn-start">СТАРТ</label><input type="text" id="t-btn-start"></div>
                    <div class="col"><label id="lbl-btn-restart">РЕСТАРТ</label><input type="text" id="t-btn-restart"></div>
                    <div class="col"><label id="lbl-prog">Вопрос N из M</label><input type="text" id="t-progress"></div>
                </div>
            </div>

            <div class="section">
                <h2 id="lbl-hit-sec">💥 Фидбек и Ранги</h2>
                <div class="row">
                    <div class="col"><label id="lbl-hit-perf">Идеально</label><input type="text" id="t-hit-perfect"></div>
                    <div class="col"><label id="lbl-hit-good">Отлично</label><input type="text" id="t-hit-good"></div>
                    <div class="col"><label id="lbl-hit-wrong">Ошибка</label><input type="text" id="t-hit-wrong"></div>
                    <div class="col"><label id="lbl-hit-miss">Промах</label><input type="text" id="t-hit-miss"></div>
                    <div class="col"><label id="lbl-combo">КОМБО</label><input type="text" id="t-combo"></div>
                </div><br>
                <div class="row">
                    <div class="col"><label id="lbl-fin-win">Текст Победы</label><input type="text" id="t-fin-win"></div>
                    <div class="col"><label id="lbl-stat-row">"подряд"</label><input type="text" id="t-stat-row"></div>
                </div><br>
                <div class="row">
                    <div class="col"><label id="lbl-r1">Ранг 1</label><input type="text" id="t-rank-1"></div>
                    <div class="col"><label id="lbl-r2">Ранг 2</label><input type="text" id="t-rank-2"></div>
                    <div class="col"><label id="lbl-r3">Ранг 3</label><input type="text" id="t-rank-3"></div>
                    <div class="col"><label id="lbl-r4">Ранг 4</label><input type="text" id="t-rank-4"></div>
                </div><br>
                <div class="row">
                    <div class="col"><label id="lbl-s1">Идеально</label><input type="text" id="t-stat-1"></div>
                    <div class="col"><label id="lbl-s2">Отлично</label><input type="text" id="t-stat-2"></div>
                    <div class="col"><label id="lbl-s3">Ошибки</label><input type="text" id="t-stat-3"></div>
                    <div class="col"><label id="lbl-s4">Макс Комбо</label><input type="text" id="t-stat-4"></div>
                </div>
            </div>

            <div class="section">
                <h2 id="lbl-q-sec">❓ Вопросы и ответы</h2>
                <div id="questions-wrapper"></div>
                <button class="btn-add" id="btn-add-q" onclick="addQuestion()">+ ДОБАВИТЬ ВОПРОС</button>
            </div>

            <button class="btn-generate" id="btn-gen" onclick="generateLink()">СГЕНЕРИРОВАТЬ ИГРУ 🚀</button>

            <div id="output-area">
                <h2 style="margin-top:0; color:#27ae60;">✅ Ваша игра готова!</h2>
                <p><b>Код для вставки в Genially (Insert -> Other -> Iframe):</b></p>
                <textarea id="iframe-code" class="code-box" readonly></textarea>
                <button class="copy-btn" onclick="copyCode('iframe-code')">📋 Скопировать код Iframe</button>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА (Предпросмотр) -->
        <div class="right-col">
            <div class="preview-title" id="lbl-preview">👁️ Предпросмотр дизайна</div>
            <div id="preview-box">
                <div id="prev-q">Пример вашего вопроса...</div>
                <div class="prev-a" id="prev-a1">Вариант 1</div>
                <div class="prev-a" id="prev-a2">Вариант 2</div>
                <div class="prev-a" id="prev-a3">Вариант 3</div>
            </div>
        </div>

    </div>
</div>

            ui: { title: "🛠️ 游戏生成器", langSec: "🌐 语言和设计", lang: "语言", font: "字体", color: "颜色", bg: "面板颜色", opacity: "不透明度:", texts: "📝 文本", stTitle: "标题", stDesc: "描述", stHint: "提示", btnStart: "开始", btnRestart: "重玩", prog: "第 N 题", hit: "💥 反馈与排名", hitPerf: "完美", hitGood: "不错", hitWrong: "错误", hitMiss: "未命中", combo: "连击", finWin: "胜利", statRow: "后缀 '连续'", r1: "排名 1", r2: "排名 2", r3: "排名 3", r4: "排名 4", s1: "完美", s2: "不错", s3: "错误", s4: "最大连击", qSec: "❓ 问题", addQ: "+ 问题", gen: "生成 🚀", del: "删除", qPh: "输入问题...", oPh: "选项", cAns: "答案:", preview: "👁️ 实时预览", prevQ: "示例问题...", prevA: "选项" },
            game: { st: "怎么玩？", sd: "金色激光快速移动。当激光准确指向正确答案时，按下按钮（或<b>空格键</b>）！", sh: "提示：连续正确回答以激活 🔥 连击 x2 和 x3！", bs: "开始！", br: "再玩一次", pr: "问题", hp: "完美！", hg: "不错！", hw: "错误！", hm: "未命中！", cmb: "连击", fw: "游戏完成", sr: "连续", r1: "新手", r2: "专家", r3: "大师！", r4: "传奇！", s1: "完美:", s2: "不错:", s3: "错误:", s4: "最大连击:" }
        }
    };

    let questionCounter = 0;
    let currentLangData = i18n['ru']; // Глобальная переменная для превью

    function changeLanguage() {
        const lang = document.getElementById('lang-select').value;
        const u = i18n[lang].ui; const g = i18n[lang].game;
        currentLangData = u; // сохраняем для предпросмотра

        document.getElementById('lbl-title').innerText = u.title; document.getElementById('lbl-lang-sec').innerText = u.langSec;
        document.getElementById('lbl-lang').innerText = u.lang; document.getElementById('lbl-font').innerText = u.font;
        document.getElementById('lbl-color').innerText = u.color; document.getElementById('lbl-bg').innerText = u.bg;
        document.getElementById('lbl-opacity').innerText = u.opacity; document.getElementById('lbl-texts-sec').innerText = u.texts;
        document.getElementById('lbl-start-title').innerText = u.stTitle; document.getElementById('lbl-start-desc').innerText = u.stDesc;
        document.getElementById('lbl-start-hint').innerText = u.stHint; document.getElementById('lbl-btn-start').innerText = u.btnStart; 
        document.getElementById('lbl-btn-restart').innerText = u.btnRestart; document.getElementById('lbl-prog').innerText = u.prog; 
        document.getElementById('lbl-hit-sec').innerText = u.hit; document.getElementById('lbl-hit-perf').innerText = u.hitPerf; 
        document.getElementById('lbl-hit-good').innerText = u.hitGood; document.getElementById('lbl-hit-wrong').innerText = u.hitWrong; 
        document.getElementById('lbl-hit-miss').innerText = u.hitMiss; document.getElementById('lbl-combo').innerText = u.combo; 
        document.getElementById('lbl-fin-sec').innerText = u.hit; document.getElementById('lbl-fin-win').innerText = u.finWin; 
        document.getElementById('lbl-stat-row').innerText = u.statRow;
        
        document.getElementById('lbl-r1').innerText = u.r1; document.getElementById('lbl-r2').innerText = u.r2;
        document.getElementById('lbl-r3').innerText = u.r3; document.getElementById('lbl-r4').innerText = u.r4;

        document.getElementById('lbl-s1').innerText = u.s1; document.getElementById('lbl-s2').innerText = u.s2;
        document.getElementById('lbl-s3').innerText = u.s3; document.getElementById('lbl-s4').innerText = u.s4;
        document.getElementById('lbl-q-sec').innerText = u.qSec; document.getElementById('btn-add-q').innerText = u.addQ;
        document.getElementById('btn-gen').innerText = u.gen;
        document.getElementById('lbl-preview').innerText = u.preview;

        document.getElementById('t-start-title').value = g.st; document.getElementById('t-start-desc').value = g.sd;
        document.getElementById('t-start-hint').value = g.sh; document.getElementById('t-btn-start').value = g.bs; 
        document.getElementById('t-btn-restart').value = g.br; document.getElementById('t-progress').value = g.pr; 
        document.getElementById('t-hit-perfect').value = g.hp; document.getElementById('t-hit-good').value = g.hg; 
        document.getElementById('t-hit-wrong').value = g.hw; document.getElementById('t-hit-miss').value = g.hm; 
        document.getElementById('t-combo').value = g.cmb; document.getElementById('t-fin-win').value = g.fw; 
        document.getElementById('t-stat-row').value = g.sr;
        
        document.getElementById('t-rank-1').value = g.r1; document.getElementById('t-rank-2').value = g.r2;
        document.getElementById('t-rank-3').value = g.r3; document.getElementById('t-rank-4').value = g.r4;

        document.getElementById('t-stat-1').value = g.s1; document.getElementById('t-stat-2').value = g.s2;
        document.getElementById('t-stat-3').value = g.s3; document.getElementById('t-stat-4').value = g.s4;

        document.querySelectorAll('.question-block').forEach((b, idx) => {
            b.querySelector('h4').innerText = `${u.qSec.split(' ')[0]} ${idx + 1}`;
            b.querySelector('.remove-btn').innerText = u.del;
            b.querySelector('.q-text').placeholder = u.qPh;
            b.querySelector('.q-opt-0').placeholder = `${u.oPh} 1`;
            b.querySelector('.q-opt-1').placeholder = `${u.oPh} 2`;
            b.querySelector('.q-opt-2').placeholder = `${u.oPh} 3`;
            const s = b.querySelector('.correct-select'); const v = s.value;
            s.options[0].text = `${u.cAns} 1`; s.options[1].text = `${u.cAns} 2`; s.options[2].text = `${u.cAns} 3`;
            s.value = v;
        });

        updatePreview();
    }

    function addQuestion() {
        questionCounter++; const lang = document.getElementById('lang-select').value; const u = i18n[lang].ui;
        const div = document.createElement('div'); div.className = 'question-block';
        div.innerHTML = `<h4>${u.qSec.split(' ')[0]} ${questionCounter}</h4><button class="remove-btn" onclick="this.parentElement.remove(); updatePreview();">${u.del}</button><div class="form-group"><input type="text" class="q-text" placeholder="${u.qPh}" oninput="updatePreview()"></div><div class="options-grid"><input type="text" class="q-opt-0" placeholder="${u.oPh} 1" oninput="updatePreview()"><input type="text" class="q-opt-1" placeholder="${u.oPh} 2" oninput="updatePreview()"><input type="text" class="q-opt-2" placeholder="${u.oPh} 3" oninput="updatePreview()"></div><select class="correct-select"><option value="0">${u.cAns} 1</option><option value="1">${u.cAns} 2</option><option value="2">${u.cAns} 3</option></select>`;
        document.getElementById('questions-wrapper').appendChild(div);
        updatePreview();
    }

    function hexToRgb(hex) {
        let r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? `${parseInt(r[1], 16)}, ${parseInt(r[2], 16)}, ${parseInt(r[3], 16)}` : "255, 255, 255";
    }

    // ЛОГИКА ЖИВОГО ПРЕДПРОСМОТРА
    function updatePreview() {
        const font = document.getElementById('cfg-font').value;
        const color = document.getElementById('cfg-color').value;
        const bgHex = document.getElementById('cfg-bg').value;
        const op = document.getElementById('cfg-opacity').value / 100;
        const bgColor = `rgba(${hexToRgb(bgHex)}, ${op})`;

        const previewBox = document.getElementById('preview-box');
        previewBox.style.fontFamily = font;

        const qBox = document.getElementById('prev-q');
        qBox.style.color = color;
        qBox.style.backgroundColor = bgColor;

        const aBoxes = document.querySelectorAll('.prev-a');
        aBoxes.forEach(b => {
            b.style.color = color;
            b.style.backgroundColor = bgColor;
        });

        // Берем текст из ПЕРВОГО вопроса, если он есть
        const firstQ = document.querySelector('.q-text');
        const firstO0 = document.querySelector('.q-opt-0');
        const firstO1 = document.querySelector('.q-opt-1');
        const firstO2 = document.querySelector('.q-opt-2');

        qBox.innerText = (firstQ && firstQ.value) ? firstQ.value : currentLangData.prevQ;
        aBoxes[0].innerText = (firstO0 && firstO0.value) ? firstO0.value : `${currentLangData.prevA} 1`;
        aBoxes[1].innerText = (firstO1 && firstO1.value) ? firstO1.value : `${currentLangData.prevA} 2`;
        aBoxes[2].innerText = (firstO2 && firstO2.value) ? firstO2.value : `${currentLangData.prevA} 3`;
    }

    // Слушатели для обновления превью при любом изменении
    document.addEventListener('input', (e) => {
        if(['cfg-font', 'cfg-color', 'cfg-bg', 'cfg-opacity'].includes(e.target.id)) {
            updatePreview();
        }
    });
    document.getElementById('cfg-font').addEventListener('change', updatePreview);

    function generateLink() {
        const qBlocks = document.querySelectorAll('.question-block');
        if (qBlocks.length === 0) { alert('Добавьте хотя бы 1 вопрос!'); return; }
        
        const config = {
            design: { font: document.getElementById('cfg-font').value, color: document.getElementById('cfg-color').value, bg: hexToRgb(document.getElementById('cfg-bg').value), op: document.getElementById('cfg-opacity').value / 100 },
            questions: Array.from(qBlocks).map(b => ({ q: b.querySelector('.q-text').value, opt: [ b.querySelector('.q-opt-0').value, b.querySelector('.q-opt-1').value, b.querySelector('.q-opt-2').value ], c: parseInt(b.querySelector('.correct-select').value) })),
            texts: { 
                st: document.getElementById('t-start-title').value, sd: document.getElementById('t-start-desc').value, sh: document.getElementById('t-start-hint').value,
                bs: document.getElementById('t-btn-start').value, br: document.getElementById('t-btn-restart').value, pr: document.getElementById('t-progress').value, 
                hp: document.getElementById('t-hit-perfect').value, hg: document.getElementById('t-hit-good').value, hw: document.getElementById('t-hit-wrong').value, 
                hm: document.getElementById('t-hit-miss').value, cmb: document.getElementById('t-combo').value, fw: document.getElementById('t-fin-win').value, 
                sr: document.getElementById('t-stat-row').value, 
                r1: document.getElementById('t-rank-1').value, r2: document.getElementById('t-rank-2').value, r3: document.getElementById('t-rank-3').value, r4: document.getElementById('t-rank-4').value,
                s1: document.getElementById('t-stat-1').value, s2: document.getElementById('t-stat-2').value, s3: document.getElementById('t-stat-3').value, s4: document.getElementById('t-stat-4').value 
            }
        };

        const encodedData = encodeURIComponent(btoa(encodeURIComponent(JSON.stringify(config))));
        const gameUrlObj = new URL('game.html', window.location.href);
        gameUrlObj.search = '?data=' + encodedData;
        const gameUrl = gameUrlObj.href;

        document.getElementById('iframe-code').value = `<iframe src="${gameUrl}" width="100%" height="720px" frameborder="0" allowfullscreen style="border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></iframe>`;
        document.getElementById('output-area').style.display = 'block';
    }

    function copyCode(id) {
        const ta = document.getElementById(id);
        ta.select(); document.execCommand('copy');
        alert('Скопировано!');
    }

    window.onload = () => { changeLanguage(); addQuestion(); }
</script>
</body>
</html>
